```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>ETC Resolver</title>

<style>
body{
  font-family:sans-serif;
  max-width:700px;
  margin:40px auto;
  text-align:center;
}

button{
  padding:12px 24px;
  font-size:18px;
  cursor:pointer;
}

#status{
  margin-top:20px;
}
</style>
</head>

<body>

<h1>baemon.eth</h1>

<p>Ethereum Classic Resolver</p>

<button id="openBtn">
열기
</button>

<div id="status"></div>

<script>

const status =
  document.getElementById("status");

document
  .getElementById("openBtn")
  .addEventListener("click", openSite);

async function openSite() {

  try {

    status.innerText =
      "Ethereum Classic Resolver 조회 중...";

    const r = await fetch(
      "https://baemon-resolver.flyhigh8006.workers.dev"
    );

    const data = await r.json();

    status.innerText =
      "IPNS 발견. 이동합니다...";

    window.location.href =
      "https://ipfs.io/ipns/" +
      data.ipns;

  } catch (err) {

    console.error(err);

    status.innerText =
      "오류: " + err.message;

  }

}

</script>

</body>
</html>
