<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>baemon.eth</title>

<style>
body{
  font-family:system-ui,sans-serif;
  max-width:760px;
  margin:60px auto;
  padding:0 20px;
  text-align:center;
  line-height:1.7;
}

h1{
  margin-bottom:10px;
}

.subtitle{
  font-size:1.1em;
  font-weight:bold;
  margin-bottom:20px;
}

.description{
  color:#444;
  margin-bottom:30px;
}

button{
  padding:14px 28px;
  font-size:18px;
  cursor:pointer;
}

#status{
  margin-top:20px;
}
</style>
</head>

<body>

<h1>baemon.eth</h1>

<div class="subtitle">
Resolved by Ethereum Classic
</div>

<div class="description">
The destination of <b>baemon.eth</b> is determined by a smart contract
stored on the Ethereum Classic blockchain and delivered through IPNS/IPFS.
</div>

<button id="openBtn">
Open
</button>

<div id="status"></div>

<script>

const status = document.getElementById("status");

document
  .getElementById("openBtn")
  .addEventListener("click", openSite);

async function openSite() {

  try {

    status.innerText =
      "Resolving through Ethereum Classic...";

    const r = await fetch(
      "https://baemon-resolver.flyhigh8006.workers.dev"
    );

    const data = await r.json();

    status.innerText =
      "IPNS destination found. Redirecting...";

    window.location.href =
      "https://ipfs.io/ipns/" +
      data.ipns;

  } catch(err) {

    console.error(err);

    status.innerText =
      "Error: " + err.message;

  }

}

</script>

</body>
</html>
